biography:
  - es: Soy ingeniero de software y estudiante de ciencias de la computación en la Universidad de Costa Rica. Mi trabajo ha incluido sistemas backend y aplicaciones móviles; mis exploraciones recientes abarcan optimización, inteligencia artificial, análisis de datos y teoría de la computación.
    en: I am a software engineer and computer science student at Universidad de Costa Rica. My work has included backend systems and mobile applications; my recent explorations span optimization, artificial intelligence, data analysis, and computational theory.
  - es: Me interesa construir sistemas claros y útiles, y estudiar con cuidado los problemas computacionales que los sostienen.
    en: I am interested in building clear, useful systems and carefully studying the computational problems behind them.

